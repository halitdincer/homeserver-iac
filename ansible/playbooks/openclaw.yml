---
- name: Configure OpenClaw VM
  hosts: openclaw
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - qemu-guest-agent
        state: present

    - name: Start and enable QEMU guest agent
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

    - name: Ensure swap file exists
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      args:
        creates: /swapfile

    - name: Install OpenClaw via official installer
      shell: curl -fsSL https://openclaw.ai/install.sh | bash
      environment:
        DEBIAN_FRONTEND: noninteractive
      args:
        creates: /usr/bin/openclaw
      register: openclaw_install
      ignore_errors: yes

    - name: Create openclaw systemd service
      copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw Gateway
          After=network.target

          [Service]
          Type=simple
          User=dincer
          ExecStart=/usr/bin/openclaw gateway --port 18789
          Restart=on-failure
          RestartSec=5
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target
      notify: reload systemd

    - name: Show deployment status
      debug:
        msg: >-
          OpenClaw v{{ openclaw_install.stdout | default('') | regex_search('([0-9]+\.[0-9]+\.[0-9]+-[0-9]+)') | default('unknown') }} installed.
          Run 'openclaw setup' interactively via SSH (ssh dincer@{{ ansible_host }}) to complete configuration,
          then 'sudo systemctl enable --now openclaw' to start the gateway on port 18789.

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
