---
- name: Configure OpenClaw VM
  hosts: openclaw
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - qemu-guest-agent
        state: present

    - name: Start and enable QEMU guest agent
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

    - name: Ensure swap file exists
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      args:
        creates: /swapfile

    - name: Install OpenClaw via official installer
      shell: curl -fsSL https://openclaw.ai/install.sh | bash
      environment:
        DEBIAN_FRONTEND: noninteractive
      args:
        creates: /usr/bin/openclaw

    - name: Run OpenClaw onboard (non-interactive)
      become: no
      shell: >
        openclaw onboard
        --non-interactive
        --accept-risk
        --flow quickstart
        --gateway-port 18789
        --gateway-bind lan
        --gateway-auth token
        --install-daemon
        --skip-channels
        --skip-skills
        --skip-ui
        --auth-choice skip
      args:
        creates: /home/dincer/.openclaw/openclaw.json

    - name: Show OpenClaw deployment status
      debug:
        msg: "OpenClaw gateway running at http://{{ ansible_host }}:18789. Configure API key via: ssh dincer@{{ ansible_host }} 'openclaw configure'"
