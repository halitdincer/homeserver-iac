---
- name: Configure OpenClaw VM
  hosts: openclaw
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - qemu-guest-agent
        state: present

    # ── Tailscale VPN (Tailscale-only access, no K3s ingress) ──

    - name: Check if Tailscale is installed
      command: which tailscale
      register: tailscale_check
      ignore_errors: yes
      changed_when: false

    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      when: tailscale_check.rc != 0

    - name: Enable Tailscale SSH
      command: tailscale set --ssh
      changed_when: false

    - name: Start and enable QEMU guest agent
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

    - name: Ensure swap file exists
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      args:
        creates: /swapfile

    - name: Install OpenClaw via official installer
      shell: curl -fsSL https://openclaw.ai/install.sh | bash
      environment:
        DEBIAN_FRONTEND: noninteractive
      args:
        creates: /usr/bin/openclaw

    - name: Run OpenClaw onboard (non-interactive)
      become: no
      shell: >
        openclaw onboard
        --non-interactive
        --accept-risk
        --flow quickstart
        --gateway-port 18789
        --gateway-bind lan
        --gateway-auth token
        --install-daemon
        --skip-channels
        --skip-skills
        --skip-ui
        --auth-choice skip
      args:
        creates: /home/dincer/.openclaw/openclaw.json

    - name: Get Tailscale IP
      command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      become: no

    - name: Show OpenClaw deployment status
      debug:
        msg: >
          OpenClaw gateways accessible via Tailscale only.
          Lyra: http://openclaw.halitdincer.com:18789 (ws://localhost:18789 via SSH tunnel).
          House: http://openclaw-house.halitdincer.com:18790 (ws://localhost:18790 via SSH tunnel).
          Tailscale IP: {{ tailscale_ip.stdout }}.
          SSH tunnel: ssh dincer@{{ tailscale_ip.stdout }} -L 18789:localhost:18789.
          Tailscale SSH enabled (no keys needed).
          Configure API key via: ssh dincer@{{ tailscale_ip.stdout }} 'openclaw configure'
