---
- name: Configure Nginx Proxy Manager VM
  hosts: nginx
  become: yes

  vars:
    npm_data_path: /opt/nginx-proxy-manager
    npm_version: latest

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - curl
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create NPM data directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ npm_data_path }}"
        - "{{ npm_data_path }}/data"
        - "{{ npm_data_path }}/letsencrypt"

    - name: Deploy NPM docker-compose.yml
      copy:
        dest: "{{ npm_data_path }}/docker-compose.yml"
        content: |
          version: '3.8'

          services:
            nginx-proxy-manager:
              image: 'jc21/nginx-proxy-manager:latest'
              container_name: nginx-proxy-manager
              restart: unless-stopped
              ports:
                - '80:80'
                - '443:443'
                - '81:81'
              environment:
                DB_SQLITE_FILE: "/data/database.sqlite"
                DISABLE_IPV6: 'true'
              volumes:
                - ./data:/data
                - ./letsencrypt:/etc/letsencrypt
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:81"]
                interval: 30s
                timeout: 10s
                retries: 3

    - name: Start NPM container
      community.docker.docker_compose:
        project_src: "{{ npm_data_path }}"
        state: present
      register: output

    - name: Show NPM deployment status
      debug:
        msg:
          - "Nginx Proxy Manager is running"
          - "Admin UI: http://{{ ansible_host }}:81"
          - "Default login: admin@example.com / changeme"
          - "HTTP: port 80"
          - "HTTPS: port 443"

    - name: Wait for NPM to be ready
      uri:
        url: "http://{{ ansible_host }}:81"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes
