---
# Master playbook to configure all services

- name: Configure all homeserver infrastructure
  hosts: all
  gather_facts: yes

  tasks:
    - name: Ping all hosts
      ping:
      ignore_errors: yes

- import_playbook: immich.yml
- import_playbook: home-assistant.yml
- import_playbook: devbox.yml
- import_playbook: backup.yml

- name: Summary
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display deployment summary
      debug:
        msg:
          - "==== Homeserver Infrastructure Deployed ===="
          - ""
          - "Services:"
          - "  - Immich: http://10.10.10.100:2283"
          - "  - Home Assistant: http://10.10.10.103:8123"
          - "  - devbox: ssh dincer@10.10.10.106"
          - "  - K3s (nginx ingress): http://10.10.10.105"
          - ""
          - "External URLs (via K3s ingress):"
          - "  - https://photos.halitdincer.com"
          - "  - https://ha.halitdincer.com"
          - "  - https://devbox.halitdincer.com (after Tailscale DNS PR)"
          - "  - https://argocd.halitdincer.com"
          - ""
          - "Routing: Internet -> Cloudflare Tunnel -> K3s ingress (10.10.10.105)"
