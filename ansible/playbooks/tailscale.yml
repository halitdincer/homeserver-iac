---
- name: Install and configure Tailscale
  hosts: "{{ target_hosts | default('all') }}"
  become: yes

  tasks:
    - name: Gather OS facts
      ansible.builtin.set_fact:
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        ts_distro: "{{ ansible_distribution | lower }}"
        ts_release: "{{ ansible_distribution_release | lower }}"

    - name: Add Tailscale GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/{{ ts_distro }}/{{ ts_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: '0644'
      when: is_debian

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/{{ ts_distro }} {{ ts_release }} main"
        filename: tailscale
        state: present
      when: is_debian

    - name: Update apt cache (Proxmox enterprise repo errors are non-fatal)
      ansible.builtin.command: apt-get update
      failed_when: false
      changed_when: false
      when: is_debian

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: no
      when: is_debian

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: yes
        state: started

    - name: Check Tailscale auth status
      ansible.builtin.command: tailscale status
      register: tailscale_status
      failed_when: false
      changed_when: false

    - name: Bring Tailscale up (prints browser auth URL if not authenticated)
      ansible.builtin.command: >
        tailscale up
        --accept-routes
        --ssh
        --hostname={{ tailscale_hostname | default(inventory_hostname) }}
      register: tailscale_up_output
      when: tailscale_status.rc != 0 or 'Logged out' in tailscale_status.stdout or force_reup | default(false) | bool
      failed_when: false

    - name: Display auth URL — visit this in your browser
      ansible.builtin.debug:
        msg: "{{ tailscale_up_output.stderr_lines }}"
      when:
        - tailscale_up_output is defined
        - tailscale_up_output.stderr_lines is defined
        - tailscale_up_output.stderr_lines | length > 0

    - name: Get Tailscale IP
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Report result
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}
          ({{ tailscale_hostname | default(inventory_hostname) }}):
          {{ tailscale_ip.stdout if tailscale_ip.rc == 0 else 'not yet authenticated' }}

- name: Post-install instructions
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Next steps
      ansible.builtin.debug:
        msg: |
          Done. For each host that printed an auth URL above, open the URL in
          your browser to authenticate it to your tailnet.

          Then in the Tailscale admin console (https://login.tailscale.com/admin/dns):
            - Enable MagicDNS
            - Enable the "Override local DNS" option

          After that, from your MacBook (with Tailscale running):
            ssh proxmox
            ssh k3s
            ssh immich
