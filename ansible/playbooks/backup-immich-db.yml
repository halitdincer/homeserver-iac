---
# Daily PostgreSQL backup for Immich
# Deploys a backup script and cron job to VM 100

- name: Configure Immich PostgreSQL daily backups
  hosts: immich
  become: yes

  vars:
    backup_dir: /opt/immich/backups
    backup_script: /opt/immich/backup-db.sh
    backup_log: /opt/immich/backups/backup.log
    retention_days: 7
    cron_hour: "3"
    cron_minute: "0"

  tasks:
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0750'

    - name: Deploy database backup script
      copy:
        dest: "{{ backup_script }}"
        mode: '0750'
        content: |
          #!/bin/bash
          # Immich PostgreSQL backup script
          # Managed by Ansible - do not edit manually

          set -euo pipefail

          BACKUP_DIR="{{ backup_dir }}"
          LOG_FILE="{{ backup_log }}"
          RETENTION_DAYS={{ retention_days }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="${BACKUP_DIR}/immich_db_${TIMESTAMP}.dump"

          log() {
              echo "$(date '+%Y-%m-%d %H:%M:%S') $1" >> "$LOG_FILE"
          }

          log "Starting Immich database backup..."

          # Run pg_dump inside the container
          if docker exec immich_postgres pg_dump \
              -U postgres \
              -d immich \
              --format=custom \
              --compress=6 \
              > "$BACKUP_FILE" 2>> "$LOG_FILE"; then

              FILESIZE=$(du -h "$BACKUP_FILE" | cut -f1)
              log "Backup completed: ${BACKUP_FILE} (${FILESIZE})"
          else
              log "ERROR: Backup failed!"
              rm -f "$BACKUP_FILE"
              exit 1
          fi

          # Prune old backups
          PRUNED=$(find "$BACKUP_DIR" -name "immich_db_*.dump" -mtime +${RETENTION_DAYS} -print -delete | wc -l)
          if [ "$PRUNED" -gt 0 ]; then
              log "Pruned ${PRUNED} backup(s) older than ${RETENTION_DAYS} days"
          fi

          log "Backup process finished. Active backups:"
          ls -lh "$BACKUP_DIR"/immich_db_*.dump 2>/dev/null >> "$LOG_FILE"

    - name: Set up daily cron job for database backup
      cron:
        name: "immich-db-backup"
        hour: "{{ cron_hour }}"
        minute: "{{ cron_minute }}"
        job: "{{ backup_script }}"
        user: root

    - name: Check if any backups already exist
      find:
        paths: "{{ backup_dir }}"
        patterns: "immich_db_*.dump"
      register: existing_db_backups

    - name: Run initial backup if none exist
      command: "{{ backup_script }}"
      when: existing_db_backups.matched == 0

    - name: List current backups
      command: ls -lh {{ backup_dir }}/
      register: backup_listing
      changed_when: false

    - name: Display backup info
      debug:
        msg:
          - "==== Immich DB Backup Configuration ===="
          - "Script: {{ backup_script }}"
          - "Schedule: Daily at {{ cron_hour }}:{{ cron_minute | string | regex_replace('^(\\d)$', '0\\1') }}"
          - "Retention: {{ retention_days }} days"
          - "Backup directory contents:"
          - "{{ backup_listing.stdout_lines }}"
