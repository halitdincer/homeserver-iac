---
# Example secrets file for Ansible Vault
# To use: ansible-vault create secrets.yml
# Then copy this structure and fill in real values

# Immich
immich_db_password: "change_me"
immich_admin_password: "change_me"

# Home Assistant
ha_long_lived_token: "change_me"  # Profile -> Security -> Long-Lived Access Tokens

# General
default_user_password: "change_me"

# Network recovery
vault_recovery_ap_password: "change_me"  # WPA2 password for proxmox-recovery AP
