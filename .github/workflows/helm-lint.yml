name: Helm Lint

# Lints + template-renders any wrapper chart under k3s-manifests/apps/<name>/
# whose contents changed in this PR. Catches Helm template errors that ArgoCD
# would otherwise surface as a sync failure on main.

on:
  pull_request:
    branches:
      - main
    paths:
      - "k3s-manifests/apps/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - uses: azure/setup-helm@v4

      - name: Discover changed wrapper charts
        id: changed
        run: |
          CHANGED=$(git diff --diff-filter=d --name-only origin/${{ github.base_ref }}...HEAD || true)
          DIRS=""
          for f in $CHANGED; do
            # Walk up: any path under k3s-manifests/apps/<name>/... whose <name>/ has Chart.yaml.
            if [[ "$f" == k3s-manifests/apps/*/* ]]; then
              D=$(echo "$f" | cut -d/ -f1-3)
              if [[ -f "$D/Chart.yaml" ]] && [[ ! " $DIRS " == *" $D "* ]]; then
                DIRS="$DIRS $D"
              fi
            fi
          done
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          echo "Found wrapper charts: $DIRS"

      - name: Lint and render
        if: steps.changed.outputs.dirs != ''
        run: |
          # CRDs the cluster has but `helm template` doesn't know about. Without
          # these, charts that gate Service/PodMonitor/PrometheusRule/ExternalSecret
          # behind `.Capabilities.APIVersions.Has` skip their own templates.
          ARGS=(
            --api-versions monitoring.coreos.com/v1
            --api-versions external-secrets.io/v1beta1
            --api-versions external-secrets.io/v1
            --api-versions argoproj.io/v1alpha1
            --api-versions cert-manager.io/v1
          )

          FAIL=0
          for d in ${{ steps.changed.outputs.dirs }}; do
            echo "::group::$d"
            helm dependency build "$d" 2>/dev/null || true
            helm lint "$d" || FAIL=1
            if ! helm template "$d" "${ARGS[@]}" > /dev/null; then
              echo "::error::template render failed for $d"
              FAIL=1
            else
              echo "render ok"
            fi
            echo "::endgroup::"
          done

          [ $FAIL -eq 0 ]
