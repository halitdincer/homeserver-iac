apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iris-mcp-secret
  annotations:
    # Block the iris-mcp Deployment until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: iris-mcp-secret
  data:
    - secretKey: MCP_BEARER
      remoteRef:
        key: secret/iris/config
        property: MCP_BEARER
    - secretKey: MCP_UPSTREAM_TOKEN
      remoteRef:
        key: secret/iris/config
        property: MCP_UPSTREAM_TOKEN
