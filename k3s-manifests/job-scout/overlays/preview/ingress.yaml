apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-scout-preview
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: preview.jobs.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: job-scout
                port:
                  number: 8000
