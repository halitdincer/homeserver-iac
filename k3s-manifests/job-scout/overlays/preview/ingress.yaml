apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-scout-preview
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: preview.jobs.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: job-scout
                port:
                  number: 8000
  tls:
    - hosts:
        - preview.jobs.halitdincer.com
      secretName: job-scout-preview-tls
