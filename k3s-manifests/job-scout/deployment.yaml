apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scout
  namespace: job-scout
  labels:
    app: job-scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-scout
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: job-scout
    spec:
      serviceAccountName: job-scout
      containers:
        - name: job-scout
          image: ghcr.io/halitdincer/job-scout:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DEBUG
              value: "False"
            - name: ALLOWED_HOSTS
              value: jobs.halitdincer.com
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: job-scout-secret
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: job-scout-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
              httpHeaders:
                - name: Host
                  value: jobs.halitdincer.com
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
              httpHeaders:
                - name: Host
                  value: jobs.halitdincer.com
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
