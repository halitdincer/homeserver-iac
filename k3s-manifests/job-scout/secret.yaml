apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: job-scout-secret
  namespace: job-scout
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: job-scout-secret
  dataFrom:
    - extract:
        key: secret/job-scout/config
