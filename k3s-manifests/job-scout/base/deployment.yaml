apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scout
  labels:
    app: job-scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-scout
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: job-scout
    spec:
      serviceAccountName: job-scout
      containers:
        - name: job-scout
          image: ghcr.io/halitdincer/job-scout:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/jobscout
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: job-scout-secret
                  key: POSTGRES_PASSWORD
            - name: INGEST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: job-scout-secret
                  key: INGEST_API_KEY
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
