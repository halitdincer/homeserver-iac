apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: job-scout-secret
  annotations:
    # Block job-scout/postgres Deployments (wave 0) until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: job-scout-secret
  dataFrom:
    - extract:
        key: secret/job-scout/config
