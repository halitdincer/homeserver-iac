---
# Atlantis - Terraform GitOps server
# Domain: atlantis.halitdincer.com
# Webhook: POST https://atlantis.halitdincer.com/events
# TLS comes from nginx default-ssl-certificate (wildcard).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlantis
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: atlantis.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlantis
                port:
                  number: 4141
