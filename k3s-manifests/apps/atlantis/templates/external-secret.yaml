---
# Atlantis VCS credentials and webhook secret synced from Vault.
# Wired into the chart's StatefulSet via values.loadEnvFromSecrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlantis-env
  namespace: {{ .Release.Namespace }}
  annotations:
    # Block the atlantis StatefulSet (wave 0) until the Secret it loads exists.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atlantis-env
  dataFrom:
    - extract:
        key: secret/atlantis/config
