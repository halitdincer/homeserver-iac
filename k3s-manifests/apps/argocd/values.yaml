argo-cd:
  # Keep generated names as `argocd-*` to match existing ingress backend, kubectl muscle memory,
  # and the in-cluster URLs that current Applications/Sources rely on.
  fullnameOverride: argocd

  global:
    domain: argocd.halitdincer.com

  configs:
    # Preserve the existing `argocd-secret` (admin password hash, server.secretkey, TLS).
    # If we let the chart create it, server.secretkey rotates and all sessions/tokens invalidate;
    # admin password reverts to a chart-generated initial value.
    secret:
      createSecret: false

    # Mirrors the current live `argocd-cm` data captured pre-cutover.
    cm:
      resource.customizations.health.argocd-image-updater.argoproj.io_ImageUpdater: |-
        hs = {}
        hs.status = "Healthy"
        hs.message = ""
        return hs

      # Cluster-wide ignoreDifferences. Applies to every Application — defining
      # them here removes the need for per-Application ignoreDifferences blocks
      # for these well-known sources of drift.
      #
      # cert-manager rotates the caBundle on webhook configurations and
      # APIService aggregations out from under us. Tolerate it everywhere so
      # any chart whose webhook is cert-manager-managed (ESO, vault-injector,
      # cert-manager itself, kyverno, etc.) does not show as OutOfSync.
      resource.customizations.ignoreDifferences.admissionregistration.k8s.io_ValidatingWebhookConfiguration: |
        jqPathExpressions:
          - '.webhooks[].clientConfig.caBundle'
      resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
        jqPathExpressions:
          - '.webhooks[].clientConfig.caBundle'
      resource.customizations.ignoreDifferences.apiregistration.k8s.io_APIService: |
        jsonPointers:
          - /spec/caBundle

      # The ESO defaulting webhook injects fields onto every ExternalSecret it
      # admits (conversionStrategy, decodingStrategy, metadataPolicy,
      # creationPolicy, deletionPolicy). These are not in our source manifests,
      # so without this rule every ExternalSecret reports OutOfSync forever.
      resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
        jsonPointers:
          - /spec/dataFrom/0/extract/conversionStrategy
          - /spec/dataFrom/0/extract/decodingStrategy
          - /spec/dataFrom/0/extract/metadataPolicy
          - /spec/target/creationPolicy
          - /spec/target/deletionPolicy

      # argo-rollouts mutates the Rollout's status/replicas during canary or
      # blue-green progression. Trust the controller; do not let selfHeal fight it.
      resource.customizations.ignoreDifferences.argoproj.io_Rollout: |
        jsonPointers:
          - /spec/replicas
        jqPathExpressions:
          - '.spec.template.spec.containers[].image'
      resource.customizations.ignoreResourceUpdates.ConfigMap: |
        jqPathExpressions:
          - '.metadata.annotations."cluster-autoscaler.kubernetes.io/last-updated"'
          - '.metadata.annotations."control-plane.alpha.kubernetes.io/leader"'
      resource.customizations.ignoreResourceUpdates.Endpoints: |
        jsonPointers:
          - /metadata
          - /subsets
      resource.customizations.ignoreResourceUpdates.all: |
        jsonPointers:
          - /status
      resource.customizations.ignoreResourceUpdates.apps_ReplicaSet: |
        jqPathExpressions:
          - '.metadata.annotations."deployment.kubernetes.io/desired-replicas"'
          - '.metadata.annotations."deployment.kubernetes.io/max-replicas"'
          - '.metadata.annotations."rollout.argoproj.io/desired-replicas"'
      resource.customizations.ignoreResourceUpdates.argoproj.io_Application: |
        jqPathExpressions:
          - '.metadata.annotations."notified.notifications.argoproj.io"'
          - '.metadata.annotations."argocd.argoproj.io/refresh"'
          - '.metadata.annotations."argocd.argoproj.io/hydrate"'
          - '.operation'
      resource.customizations.ignoreResourceUpdates.argoproj.io_Rollout: |
        jqPathExpressions:
          - '.metadata.annotations."notified.notifications.argoproj.io"'
      resource.customizations.ignoreResourceUpdates.autoscaling_HorizontalPodAutoscaler: |
        jqPathExpressions:
          - '.metadata.annotations."autoscaling.alpha.kubernetes.io/behavior"'
          - '.metadata.annotations."autoscaling.alpha.kubernetes.io/conditions"'
          - '.metadata.annotations."autoscaling.alpha.kubernetes.io/metrics"'
          - '.metadata.annotations."autoscaling.alpha.kubernetes.io/current-metrics"'
      resource.customizations.ignoreResourceUpdates.discovery.k8s.io_EndpointSlice: |
        jsonPointers:
          - /metadata
          - /endpoints
          - /ports
      resource.exclusions: |
        - apiGroups:
          - ''
          - discovery.k8s.io
          kinds:
          - Endpoints
          - EndpointSlice
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        - apiGroups:
          - cilium.io
          kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest

    # TLS terminates at the ingress; ArgoCD server itself runs in insecure mode behind it
    # to match the current backend-protocol: HTTPS / force-ssl-redirect ingress behavior.
    # Current install runs argocd-server with TLS (port 443 in the Service); preserve that.
    params:
      server.insecure: false


  # Each component exposes Prometheus metrics on a sidecar port; enabling the
  # ServiceMonitor lets kube-prometheus-stack auto-discover them. The application
  # controller is the source of `argocd_app_info` / `argocd_app_sync_total`,
  # which the ArgoApp* alerts in apps/monitoring rely on.
  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  repoServer:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  # Server: NodePort to match current install (80:31552, 443:30777). The ingress targets the
  # ClusterIP through the Service name, so node ports are mostly historical, but matching them
  # avoids confusion if anything else points at them.
  server:
    service:
      type: NodePort
      nodePortHttp: 31552
      nodePortHttps: 30777
    ingress:
      # We ship our own ingress in templates/ to stay consistent with the other wrappers.
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  applicationSet:
    enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  notifications:
    enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    # Post sync/health failures directly to ntfy.sh. Skips the Alertmanager-shaped ntfy-relay
    # (different payload schema) and avoids an extra hop. Topic 'halitdincer-homeserver' matches
    # the existing relay's topic so notifications land in the same phone subscription.
    notifiers:
      service.webhook.ntfy: |
        url: https://ntfy.sh/halitdincer-homeserver
        headers:
        - name: Content-Type
          value: text/plain
    templates:
      template.app-sync-failed: |
        webhook:
          ntfy:
            method: POST
            body: |
              {{.app.metadata.name}}: {{.app.status.operationState.message}}
              {{.context.argocdUrl}}/applications/{{.app.metadata.name}}
            headers:
            - name: Title
              value: "ArgoCD sync failed: {{.app.metadata.name}}"
            - name: Priority
              value: "4"
            - name: Tags
              value: "warning,argocd"
      template.app-health-degraded: |
        webhook:
          ntfy:
            method: POST
            body: |
              {{.app.metadata.name}} is Degraded
              {{.context.argocdUrl}}/applications/{{.app.metadata.name}}
            headers:
            - name: Title
              value: "ArgoCD degraded: {{.app.metadata.name}}"
            - name: Priority
              value: "4"
            - name: Tags
              value: "warning,argocd"
    triggers:
      trigger.on-sync-failed: |
        - description: Application sync failed
          send: [app-sync-failed]
          when: app.status.operationState.phase in ['Error', 'Failed']
      trigger.on-health-degraded: |
        - description: Application health degraded
          send: [app-health-degraded]
          when: app.status.health.status == 'Degraded'
    # Global default subscription — applies to ALL Applications without per-app annotations.
    # Recipient is the webhook *name* (not `webhook:ntfy`); the engine keys named
    # services by name, so `service.webhook.ntfy` is dispatched as recipient `ntfy`.
    subscriptions:
      - recipients:
          - ntfy
        triggers:
          - on-sync-failed
          - on-health-degraded
  dex:
    enabled: true
  redis:
    enabled: true

  # Don't install the bundled CRDs via the chart — the cluster already has them from the original
  # raw-manifest install. Helm would otherwise try to take ownership of CRDs and could conflict.
  # (We can flip this to true on the next major version bump if upstream evolves the CRDs.)
  crds:
    install: false
