# Atlantis - Terraform GitOps server
# Domain: atlantis.halitdincer.com
# Webhook: POST https://atlantis.halitdincer.com/events
# Secrets managed via ExternalSecret (Vault path: secret/atlantis/config)

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlantis-env
  namespace: atlantis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atlantis-env
  dataFrom:
    - extract:
        key: secret/atlantis/config

---
apiVersion: v1
kind: Namespace
metadata:
  name: atlantis

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlantis
  namespace: atlantis

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlantis-home
  namespace: atlantis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlantis
  namespace: atlantis
  labels:
    app: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  serviceName: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.31.0
          args:
            - server
            - --atlantis-url=https://atlantis.halitdincer.com
            - --gh-user=halitdincer
            - --gh-token=$(ATLANTIS_GH_TOKEN)
            - --gh-webhook-secret=$(ATLANTIS_GH_WEBHOOK_SECRET)
            - --repo-allowlist=github.com/halitdincer/homeserver-iac
            - --default-tf-version=1.5.7
            - --data-dir=/atlantis-home
            - --port=4141
            - --write-git-creds
          env:
            - name: HOME
              value: /home/atlantis
          envFrom:
            - secretRef:
                name: atlantis-env
          ports:
            - name: http
              containerPort: 4141
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4141
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: atlantis-home
              mountPath: /atlantis-home
      volumes:
        - name: atlantis-home
          persistentVolumeClaim:
            claimName: atlantis-home

---
apiVersion: v1
kind: Service
metadata:
  name: atlantis
  namespace: atlantis
spec:
  selector:
    app: atlantis
  ports:
    - name: http
      port: 4141
      targetPort: http
