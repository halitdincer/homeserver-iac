---
# Grafana auto-discovers ConfigMaps with this label cluster-wide thanks to
# the kube-prometheus-stack Grafana sidecar config (sidecar.datasources.enabled
# = true, searchNamespace: ALL). Sits in the loki namespace so the lifecycle
# of the datasource follows the lifecycle of Loki itself.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        # Pin a stable UID so dashboard JSON in apps/monitoring/dashboards/
        # can reference this datasource by uid: loki without depending on
        # whatever auto-generated uid Grafana would otherwise assign.
        uid: loki
        type: loki
        access: proxy
        # In-cluster URL to the Loki gateway Service (chart names it
        # <release>-gateway, listening on port 80).
        url: http://loki-gateway.{{ .Release.Namespace }}.svc.cluster.local
        isDefault: false
        editable: false
        jsonData:
          maxLines: 1000
