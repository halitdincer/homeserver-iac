---
# Grafana admin credentials synced from Vault.
# Wired into the chart's Grafana Deployment via grafana.admin.existingSecret in values.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin
  dataFrom:
    - extract:
        key: secret/monitoring/grafana
