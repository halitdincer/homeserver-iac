---
# Grafana - Metrics Dashboards
# Domain: grafana.halitdincer.com
# Backend service is the chart-rendered kps-grafana on port 80.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.halitdincer.com
      secretName: grafana-tls
  rules:
    - host: grafana.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kps-grafana
                port:
                  number: 80
