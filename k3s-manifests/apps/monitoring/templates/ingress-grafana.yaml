---
# Grafana - Metrics Dashboards
# Domain: grafana.halitdincer.com
# Backend service is the chart-rendered monitoring-grafana on port 80.
# Grafana is a subchart of kube-prometheus-stack; the top-level
# fullnameOverride: kps does not apply to subchart resources, so the
# Service is named <release>-grafana = monitoring-grafana.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.halitdincer.com
      secretName: grafana-tls
  rules:
    - host: grafana.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
