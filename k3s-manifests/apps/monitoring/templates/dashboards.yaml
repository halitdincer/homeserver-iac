{{- /*
Auto-wrap every JSON file in apps/monitoring/dashboards/ as a labeled
ConfigMap. The kube-prometheus-stack Grafana sidecar (sidecar.dashboards.
enabled=true, searchNamespace: ALL) imports them into Grafana.

Drop a new dashboard JSON in dashboards/ — push to main — ArgoCD syncs —
sidecar imports within ~30s. No per-dashboard YAML boilerplate.
*/ -}}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-{{ base $path | trimSuffix ".json" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
