---
# ntfy-relay — receives Alertmanager webhook POSTs, formats per-alert payloads,
# and forwards to ntfy.sh. Replaces the prior Grafana-webhook-format relay.
# Alertmanager schema: https://prometheus.io/docs/alerting/latest/configuration/#webhook_config
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-relay-script
  namespace: {{ .Release.Namespace }}
data:
  relay.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json
    import urllib.request

    NTFY_URL = "https://ntfy.sh"
    TOPIC = "halitdincer-homeserver"

    def post_ntfy(title, message, priority):
        payload = json.dumps({
            "topic": TOPIC,
            "title": title,
            "message": message,
            "priority": priority,
        }).encode()
        req = urllib.request.Request(
            NTFY_URL,
            data=payload,
            headers={"Content-Type": "application/json"},
        )
        try:
            urllib.request.urlopen(req, timeout=10)
        except Exception as e:
            print(f"ntfy error: {e}", flush=True)

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            # Simple liveness endpoint.
            if self.path == "/health":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
                return
            self.send_response(404)
            self.end_headers()

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length) if length else b"{}"
            try:
                data = json.loads(body)
            except json.JSONDecodeError:
                data = {}

            # Alertmanager payload: {"status": "firing"|"resolved",
            #                         "alerts": [{"status", "labels", "annotations"}, ...]}
            alerts = data.get("alerts", [])
            if not alerts:
                # Fallback for non-Alertmanager test payloads.
                post_ntfy(
                    data.get("title", "Homeserver Alert"),
                    data.get("message", json.dumps(data)[:500]),
                    4,
                )
                self.send_response(200)
                self.end_headers()
                return

            for alert in alerts:
                labels = alert.get("labels", {}) or {}
                annotations = alert.get("annotations", {}) or {}
                status = alert.get("status", "firing")
                alertname = labels.get("alertname", "Alert")
                severity = labels.get("severity", "warning")
                summary = annotations.get("summary", alertname)
                description = annotations.get("description", "")
                instance = labels.get("instance", "")

                title = f"[{status.upper()}] {alertname}"
                message_parts = [summary]
                if description:
                    message_parts.append(description)
                if instance:
                    message_parts.append(f"instance: {instance}")
                message_parts.append(f"severity: {severity}")
                message = "\n".join(message_parts)

                if status == "resolved":
                    priority = 3
                elif severity == "critical":
                    priority = 5
                else:
                    priority = 4

                post_ntfy(title, message, priority)

            self.send_response(200)
            self.end_headers()

        def log_message(self, fmt, *args):
            print(f"relay: {args[0]}", flush=True)

    print("ntfy-relay listening on :8080", flush=True)
    HTTPServer(("", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-relay
  namespace: {{ .Release.Namespace }}
  labels:
    app: ntfy-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-relay
  template:
    metadata:
      labels:
        app: ntfy-relay
      annotations:
        # Roll the deployment when relay.py changes.
        checksum/config: {{ .Files.Get "templates/ntfy-relay.yaml" | sha256sum }}
    spec:
      containers:
        - name: relay
          image: cgr.dev/chainguard/python:latest
          command: ["python3", "-u", "/app/relay.py"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: ntfy-relay-script
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-relay
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: ntfy-relay
  ports:
    - port: 8080
      targetPort: 8080
