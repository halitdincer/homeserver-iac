{{/*
Cluster-wide alerts complementing prometheusrule-critical.yaml. The "critical"
file covers host-level disk/memory and the Proxmox external target; this file
covers in-cluster failure modes surfaced by kube-state-metrics + kubelet.

All alerts route through the default Alertmanager receiver (ntfy-relay). Severity
is set explicitly so the inhibit_rules in values.yaml work as intended.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homeserver-cluster
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: homeserver-cluster-volumes
      rules:
        - alert: PersistentVolumeFillingUp
          # Forecast 4h ahead using a 6h linear regression — alerts before the PV
          # actually fills, giving room to expand or clean up.
          expr: |
            (
              kubelet_volume_stats_available_bytes{job="kubelet"}
              / kubelet_volume_stats_capacity_bytes{job="kubelet"}
            ) < 0.10
            and
            predict_linear(kubelet_volume_stats_available_bytes{job="kubelet"}[6h], 4 * 3600) < 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: PersistentVolume {{ "{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}" }} filling up
            description: '{{ "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has <10% free and is projected to fill within 4h." }}'

    - name: homeserver-cluster-nodes
      rules:
        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Node {{ "{{ $labels.node }}" }} reporting DiskPressure
            description: kubelet has begun evicting pods due to disk pressure.

        - alert: NodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Node {{ "{{ $labels.node }}" }} reporting MemoryPressure
            description: kubelet has begun evicting pods due to memory pressure.

    - name: homeserver-cluster-workloads
      rules:
        # Distinct from kube-prometheus-stack's KubePodCrashLooping — that alert
        # only fires after 15 min and we want a faster signal in the homelab.
        - alert: PodCrashLoopBackOff
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Pod {{ "{{ $labels.namespace }}/{{ $labels.pod }}" }} CrashLoopBackOff
            description: '{{ "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is restarting in a crash loop." }}'

        - alert: PodImagePullBackOff
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Pod {{ "{{ $labels.namespace }}/{{ $labels.pod }}" }} cannot pull image
            description: '{{ "Container {{ $labels.container }} stuck in {{ $labels.reason }}." }}'

        - alert: DeploymentReplicasUnavailable
          # Differs from KubeDeploymentReplicasMismatch by alerting on absolute
          # zero-available, not just any mismatch — catches full outages quickly.
          expr: |
            kube_deployment_status_replicas_available{namespace!~"job-scout-preview-.*"} == 0
            and on (namespace, deployment)
            kube_deployment_spec_replicas > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Deployment {{ "{{ $labels.namespace }}/{{ $labels.deployment }}" }} has 0 ready replicas
            description: All replicas of this Deployment are unavailable.

    - name: homeserver-cluster-secrets
      rules:
        # ESO emits this gauge from the controller; relies on serviceMonitor.enabled
        # in the external-secrets Helm values. When Vault is sealed or ESO loses
        # auth, every consuming Deployment silently keeps serving the cached
        # Secret value — so a stuck Ready=False is the earliest failure signal.
        - alert: ExternalSecretNotReady
          expr: |
            externalsecret_status_condition{condition="Ready",status="False"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: ExternalSecret {{ "{{ $labels.namespace }}/{{ $labels.name }}" }} not Ready
            description: ESO has been unable to sync this ExternalSecret from its store for >15m.

    - name: homeserver-cluster-argocd
      rules:
        # argocd-notifications already pages on a single sync failure (per-app
        # webhook). These rules cover the harder-to-spot cases:
        #   1. Drift that selfHeal can't fix (e.g. webhook rejecting the manifest).
        #   2. The notifications controller itself being down — in which case
        #      we'd never see a notification, but Prometheus would still alert.
        - alert: ArgoAppOutOfSync
          # Preview apps churn aggressively; ignore them.
          expr: |
            argocd_app_info{sync_status="OutOfSync",name!~"job-scout-pr-.*"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: ArgoCD app {{ "{{ $labels.name }}" }} OutOfSync >30m
            description: '{{ "selfHeal has not been able to converge {{ $labels.name }} (project {{ $labels.project }}) for 30 minutes — manual investigation required." }}'

        - alert: ArgoAppNotHealthy
          expr: |
            argocd_app_info{health_status=~"Degraded|Missing|Unknown",name!~"job-scout-pr-.*"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: ArgoCD app {{ "{{ $labels.name }}" }} {{ "{{ $labels.health_status }}" }} >30m
            description: '{{ "App {{ $labels.name }} health is {{ $labels.health_status }}." }}'

        - alert: ArgoSyncFailureRate
          # Sustained failed syncs across the cluster — indicates a wider problem
          # (repo-server unable to clone, AppProject restriction newly violated,
          # etc.) that's worth surfacing as a single rolled-up alert rather than
          # one per-app notification.
          expr: |
            sum(rate(argocd_app_sync_total{phase=~"Failed|Error"}[15m])) > 0.1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: ArgoCD sync failures >0.1/s for 15m
            description: Multiple ArgoCD Applications are failing to sync — check argocd-application-controller logs.

