---
# Prometheus - Metrics Collection
# Domain: prometheus.halitdincer.com
# Backend service is the chart-rendered kps-prometheus on port 9090.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus.halitdincer.com
      secretName: prometheus-tls
  rules:
    - host: prometheus.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kps-prometheus
                port:
                  number: 9090
