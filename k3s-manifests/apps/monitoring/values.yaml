kube-prometheus-stack:
  # Short prefix keeps generated resource names manageable.
  fullnameOverride: kps

  # Let the chart manage Prometheus operator CRDs (Prometheus, Alertmanager,
  # ServiceMonitor, PodMonitor, PrometheusRule, Probe, AlertmanagerConfig,
  # ScrapeConfig). ServerSideApply=true on the ArgoCD Application is required
  # because some CRDs exceed the 256 KB client-side annotation limit.
  crds:
    enabled: true

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 4GiB
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
      # Discover ServiceMonitor / PodMonitor / PrometheusRule / Probe in any
      # namespace without label-selector ceremony — homelab, no multi-tenant.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      # External Proxmox host node_exporter target (10.10.10.1:9100).
      additionalScrapeConfigs:
        - job_name: proxmox-host
          static_configs:
            - targets: ["10.10.10.1:9100"]
              labels:
                instance: proxmox
                job: node

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
    config:
      route:
        receiver: ntfy-relay
        group_by: ["alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          # Watchdog is a permanently-firing alert from kube-prometheus-stack used
          # to verify alerting pipelines via dead-man's-switch tools. We don't run
          # one, so route it to null instead of paging ntfy.
          - matchers:
              - alertname = "Watchdog"
            receiver: "null"
      receivers:
        - name: "null"
        - name: ntfy-relay
          webhook_configs:
            - url: http://ntfy-relay.monitoring.svc.cluster.local:8080
              send_resolved: true
      # Suppress downstream symptoms when an upstream root-cause alert is firing
      # for the same pod / workload. Cuts the cascade where one CrashLoopBackOff
      # produces 4-5 separate ntfy notifications.
      inhibit_rules:
        - source_matchers:
            - alertname = "KubePodCrashLooping"
          target_matchers:
            - alertname =~ "KubePodNotReady|KubeContainerWaiting"
          equal: ["namespace", "pod"]
        - source_matchers:
            - alertname = "KubeDeploymentRolloutStuck"
          target_matchers:
            - alertname = "KubeDeploymentReplicasMismatch"
          equal: ["namespace", "deployment"]
        - source_matchers:
            - alertname =~ "KubePodCrashLooping|KubeContainerWaiting"
          target_matchers:
            - alertname = "KubeStatefulSetReplicasMismatch"
          equal: ["namespace"]

  grafana:
    enabled: true
    # Admin creds come from the Vault-backed grafana-admin Secret created by
    # the ExternalSecret in templates/grafana-admin-secret.yaml.
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    # Disable the initChownData init container. Grafana creates
    # /var/lib/grafana/{csv,pdf,png} at runtime with mode 700; the init
    # container drops all caps except CHOWN (no DAC_OVERRIDE), so on any
    # subsequent rollout it can't traverse those dirs and `chown -R` fails
    # with EACCES, blocking the rollout. The PVC files are already owned
    # by the grafana UID (472) from the first install, so the chown is a
    # no-op anyway.
    initChownData:
      enabled: false
    grafana.ini:
      server:
        root_url: https://grafana.halitdincer.com
      analytics:
        reporting_enabled: false
        check_for_updates: false
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        # Match dashboards: scan every namespace for ConfigMaps labeled
        # grafana_datasource=1. Lets each app ship its own datasource next
        # to its workload (e.g. apps/loki/templates/grafana-datasource.yaml).
        searchNamespace: ALL
    # We ship our own ingress (consistent with other Helm wrappers in this repo).
    ingress:
      enabled: false
    service:
      type: ClusterIP

  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true

  # k3s control-plane: only the API server is independently scrapable.
  # controller-manager, scheduler, etcd are embedded in the k3s server binary
  # and not exposed as separate metrics endpoints. kube-proxy is not deployed.
  kubeApiServer:
    enabled: true
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
