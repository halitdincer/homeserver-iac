---
# ServiceAccount referenced by the chart's deployment via values.serviceAccount.name.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: {{ .Release.Namespace }}

---
# Long-lived API token for the SA — homepage uses this to talk to the K8s API
# for the cluster widget.
apiVersion: v1
kind: Secret
metadata:
  name: homepage-token
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/service-account.name: homepage
type: kubernetes.io/service-account-token

---
# Read-only access to the resources homepage's K8s widget needs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: {{ .Release.Namespace }}
