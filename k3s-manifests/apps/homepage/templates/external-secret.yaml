---
# Sync API keys from Vault -> homepage-secret K8s Secret.
# Wired to the deployment via values.envFrom.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: homepage-secret
  dataFrom:
    - extract:
        key: secret/homepage/config
