---
# Grafana - Metrics Dashboards & Visualization
# Domain: grafana.halitdincer.com
# Namespace: monitoring
# Default login: admin / admin (change on first login)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      access: proxy
      url: http://prometheus.monitoring.svc.cluster.local:9090
      isDefault: true
      editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  alerting.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: ntfy-homeserver
        receivers:
          - uid: ntfy-1
            type: webhook
            settings:
              url: https://ntfy.sh/halitdincer-homeserver
              httpMethod: POST
              body: >-
                {"topic":"halitdincer-homeserver","message":"ALERT: {{ "{{ .CommonLabels.alertname }}" }} - {{ "{{ .CommonAnnotations.description }}" }}","priority":4}
    policies:
      - orgId: 1
        receiver: ntfy-homeserver
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Homeserver Infrastructure
        folder: Alerts
        interval: 60s
        rules:
          - uid: disk-space-critical
            title: Disk Space Critical
            condition: C
            for: 5m
            annotations:
              description: "Disk usage above 85% on {{ \"{{ $labels.instance }}\" }} ({{ \"{{ $labels.mountpoint }}\" }})"
            labels:
              severity: warning
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  expr: (1 - node_filesystem_avail_bytes{fstype!="tmpfs",mountpoint!=""} / node_filesystem_size_bytes) * 100 > 85
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "-100"
                model:
                  refId: C
                  type: reduce
                  expression: A
                  reducer: last
                  conditions:
                    - evaluator:
                        type: gt
                        params: [85]
                      operator:
                        type: and
          - uid: memory-critical
            title: Memory Critical
            condition: C
            for: 5m
            annotations:
              description: "Available memory below 10% on {{ \"{{ $labels.instance }}\" }}"
            labels:
              severity: warning
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "-100"
                model:
                  refId: C
                  type: reduce
                  expression: A
                  reducer: last
                  conditions:
                    - evaluator:
                        type: gt
                        params: [90]
                      operator:
                        type: and
          - uid: cpu-temp-high
            title: CPU Temperature High
            condition: C
            for: 2m
            annotations:
              description: "CPU temperature above 80C on {{ \"{{ $labels.instance }}\" }}"
            labels:
              severity: critical
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  expr: node_hwmon_temp_celsius > 80
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "-100"
                model:
                  refId: C
                  type: reduce
                  expression: A
                  reducer: last
                  conditions:
                    - evaluator:
                        type: gt
                        params: [80]
                      operator:
                        type: and
          - uid: host-down
            title: Proxmox Host Unreachable
            condition: C
            for: 2m
            annotations:
              description: "Proxmox host node_exporter not responding"
            labels:
              severity: critical
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  expr: up{job="proxmox-host"} == 0
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: "-100"
                model:
                  refId: C
                  type: reduce
                  expression: A
                  reducer: last
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                      operator:
                        type: and

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_SERVER_ROOT_URL
          value: "https://grafana.halitdincer.com"
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: alerting
          mountPath: /etc/grafana/provisioning/alerting
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-data
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: alerting
        configMap:
          name: grafana-alerting

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: http
