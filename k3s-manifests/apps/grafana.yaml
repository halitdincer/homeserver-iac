---
# Grafana - Metrics Dashboards & Visualization
# Domain: grafana.halitdincer.com
# Namespace: monitoring
# Default login: admin / admin (change on first login)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus.monitoring.svc.cluster.local:9090
      isDefault: true
      editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  alerting.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: ntfy-homeserver
        receivers:
          - uid: ntfy-1
            type: webhook
            settings:
              url: http://ntfy-relay.monitoring.svc.cluster.local:8080
              httpMethod: POST
    policies:
      - orgId: 1
        receiver: ntfy-homeserver
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
    groups:
      - orgId: 1
        name: Homeserver Critical
        folder: Alerts
        interval: 1m
        rules:
          - uid: disk-space-critical
            title: Disk Full (>95%)
            condition: C
            for: 10m
            noDataState: OK
            execErrState: OK
            annotations:
              description: "Disk almost full"
            labels:
              severity: critical
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "(1 - node_filesystem_avail_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"} / node_filesystem_size_bytes) * 100"
                  refId: A
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [95]
                  refId: C
          - uid: memory-critical
            title: Memory Critical (>95%)
            condition: C
            for: 5m
            noDataState: OK
            execErrState: OK
            annotations:
              description: "Memory almost exhausted"
            labels:
              severity: critical
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100"
                  refId: A
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [95]
                  refId: C
          - uid: host-down
            title: Proxmox Host Unreachable
            condition: C
            for: 5m
            noDataState: OK
            execErrState: OK
            annotations:
              description: "Proxmox host not responding"
            labels:
              severity: critical
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "up{job=\"proxmox-host\"} == 0"
                  refId: A
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C

---
# ntfy relay — receives Grafana webhook default payload,
# extracts title + message, forwards to ntfy.sh JSON API
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-relay-script
  namespace: monitoring
data:
  relay.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json
    import urllib.request

    NTFY_URL = "https://ntfy.sh"
    TOPIC = "halitdincer-homeserver"

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length) if length else b"{}"
            try:
                data = json.loads(body)
            except json.JSONDecodeError:
                data = {}

            title = data.get("title", "Homeserver Alert")
            message = data.get("message", data.get("status", "alert"))
            status = data.get("status", "firing")
            priority = 4 if status == "firing" else 3

            payload = json.dumps({
                "topic": TOPIC,
                "title": title,
                "message": message,
                "priority": priority,
            }).encode()

            req = urllib.request.Request(
                NTFY_URL,
                data=payload,
                headers={"Content-Type": "application/json"},
            )
            try:
                urllib.request.urlopen(req)
            except Exception as e:
                print(f"ntfy error: {e}")

            self.send_response(200)
            self.end_headers()

        def log_message(self, fmt, *args):
            print(f"relay: {args[0]}")

    print("ntfy-relay listening on :8080")
    HTTPServer(("", 8080), Handler).serve_forever()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-relay
  namespace: monitoring
  labels:
    app: ntfy-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-relay
  template:
    metadata:
      labels:
        app: ntfy-relay
    spec:
      containers:
      - name: relay
        image: cgr.dev/chainguard/python:latest
        command: ["python3", "-u", "/app/relay.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script
          mountPath: /app
      volumes:
      - name: script
        configMap:
          name: ntfy-relay-script

---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-relay
  namespace: monitoring
spec:
  selector:
    app: ntfy-relay
  ports:
  - port: 8080
    targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_SERVER_ROOT_URL
          value: "https://grafana.halitdincer.com"
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: alerting
          mountPath: /etc/grafana/provisioning/alerting
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-data
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: alerting
        configMap:
          name: grafana-alerting

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: http
