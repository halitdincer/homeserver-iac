# ImageUpdater CR for job-scout
# Watches ghcr.io/halitdincer/job-scout:latest by digest and writes
# the resolved image digest into the production kustomization on main.
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: job-scout
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: "job-scout"
      images:
        - alias: job-scout
          imageName: ghcr.io/halitdincer/job-scout:latest
          manifestTargets:
            kustomize:
              name: ghcr.io/halitdincer/job-scout
          commonUpdateSettings:
            updateStrategy: digest
  writeBackConfig:
    method: git
    gitConfig:
      branch: main
      writeBackTarget: "kustomization:."
