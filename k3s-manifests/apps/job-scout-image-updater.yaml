# ImageUpdater CR for job-scout
# Watches ghcr.io/halitdincer/job-scout:latest by digest and triggers
# ArgoCD to redeploy when a new image is pushed to main branch.
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: job-scout
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: "job-scout"
      images:
        - alias: job-scout
          imageName: ghcr.io/halitdincer/job-scout:latest
          commonUpdateSettings:
            updateStrategy: digest
  writeBackConfig:
    method: argocd
