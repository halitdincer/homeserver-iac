---
# Gatus - Status monitoring (GitOps-native replacement for Uptime Kuma)
# Domain: status.halitdincer.com
# Monitors defined in ConfigMap below — edit here, push to main, ArgoCD syncs
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: default
data:
  config.yaml: |
    web:
      port: 8080
    storage:
      type: sqlite
      path: /data/gatus.db
    endpoints:
      # ── Public Services ──
      - name: Immich
        group: Public
        url: https://photos.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Home Assistant
        group: Public
        url: https://ha.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Homepage
        group: Public
        url: https://home.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: code-server
        group: Public
        url: https://code.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: job-scout
        group: Public
        url: https://jobs.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Flight Tracker
        group: Public
        url: https://flights.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      # ── K3s Infrastructure ──
      - name: ArgoCD
        group: K3s
        url: https://argocd.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Atlantis
        group: K3s
        url: https://atlantis.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Grafana
        group: K3s
        url: https://grafana.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Prometheus
        group: K3s
        url: https://prometheus.halitdincer.com
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      # ── Internal ──
      - name: Proxmox
        group: Internal
        url: https://10.10.10.1:8006
        interval: 1m
        client:
          insecure: true
        conditions:
          - "[STATUS] == 200"

      - name: Vault
        group: Internal
        url: http://vault.vault.svc.cluster.local:8200/v1/sys/health
        interval: 1m
        conditions:
          - "[STATUS] == 200"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gatus-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: default
  labels:
    app: gatus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      containers:
        - name: gatus
          image: ghcr.io/twin/gatus:v5.34.0
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: gatus-config
        - name: data
          persistentVolumeClaim:
            claimName: gatus-data

---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: default
spec:
  selector:
    app: gatus
  ports:
    - name: http
      port: 8080
      targetPort: http
