apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-secret
  namespace: coder
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: home-assistant-secret
  dataFrom:
    - extract:
        key: secret/coder/home-assistant
