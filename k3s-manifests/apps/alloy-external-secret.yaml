apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud
  namespace: alloy
  annotations:
    # Block the Alloy DaemonSet (separate Application via the helm-charts
    # AppSet, default wave 0) from rolling until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-cloud
  dataFrom:
    - extract:
        key: secret/grafana-cloud/config
