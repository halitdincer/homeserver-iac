apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud
  namespace: alloy
  annotations:
    # Block the Alloy DaemonSet (separate Application via the helm-charts
    # AppSet, default wave 0) from rolling until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-cloud
  # Remap Vault keys (hyphenated, lowercase) → POSIX-shaped env var names
  # (UPPER_SNAKE) so River's sys.env() lookups in the Alloy config resolve.
  data:
    - secretKey: PROM_URL
      remoteRef: { key: secret/grafana-cloud/config, property: prom-url }
    - secretKey: PROM_USER
      remoteRef: { key: secret/grafana-cloud/config, property: prom-user }
    - secretKey: LOKI_URL
      remoteRef: { key: secret/grafana-cloud/config, property: loki-url }
    - secretKey: LOKI_USER
      remoteRef: { key: secret/grafana-cloud/config, property: loki-user }
    - secretKey: API_KEY
      remoteRef: { key: secret/grafana-cloud/config, property: api-key }
