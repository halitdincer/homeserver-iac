apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-appset-token
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: github-appset-token
  data:
    - secretKey: token
      remoteRef:
        key: secret/atlantis/config
        property: ATLANTIS_GH_TOKEN
