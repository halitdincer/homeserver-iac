apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coder-secret
  namespace: coder
  annotations:
    # Block coder Deployment + coder-postgres StatefulSet (in their own
    # Applications, wave 0) until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: coder-secret
  dataFrom:
    - extract:
        key: secret/coder/config
