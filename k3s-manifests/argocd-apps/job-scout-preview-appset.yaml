apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: job-scout-preview
  namespace: argocd
spec:
  generators:
    - pullRequest:
        github:
          owner: halitdincer
          repo: job-scout
          tokenRef:
            secretName: github-appset-token
            key: token
          labels:
            - preview
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "job-scout-pr-{{number}}"
      labels:
        app: job-scout-preview
        pr: "{{number}}"
    spec:
      project: default
      source:
        repoURL: git@github.com:halitdincer/homeserver-iac.git
        targetRevision: main
        path: k3s-manifests/job-scout/overlays/preview
        kustomize:
          images:
            - "ghcr.io/halitdincer/job-scout:pr-{{number}}"
          namespace: "job-scout-preview-{{number}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "job-scout-preview-{{number}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
