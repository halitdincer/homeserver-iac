# ArgoCD Application for job-scout
# Managed by ArgoCD Image Updater - auto-deploys when ghcr.io/halitdincer/job-scout:latest digest changes
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-scout
  namespace: argocd

spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/job-scout
  destination:
    server: https://kubernetes.default.svc
    namespace: job-scout
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
