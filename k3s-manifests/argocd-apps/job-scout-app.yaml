# ArgoCD Application for job-scout
# Managed by ArgoCD Image Updater - auto-deploys when ghcr.io/halitdincer/job-scout:latest digest changes
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-scout
  namespace: argocd
  annotations:
    # Track :latest by digest - triggers deploy when a new image is pushed
    argocd-image-updater.argoproj.io/image-list: job-scout=ghcr.io/halitdincer/job-scout:latest
    argocd-image-updater.argoproj.io/job-scout.update-strategy: digest
    # argocd write-back: stores image override in the Application spec (no git commit needed)
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/job-scout
  destination:
    server: https://kubernetes.default.svc
    namespace: job-scout
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
