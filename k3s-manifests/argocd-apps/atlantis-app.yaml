---
# ArgoCD Application for the atlantis Helm wrapper.
# Source: k3s-manifests/apps/atlantis/ (Chart.yaml depends on runatlantis/atlantis).
# ArgoCD runs `helm dependency build` automatically on sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlantis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/apps/atlantis

  destination:
    server: https://kubernetes.default.svc
    namespace: atlantis

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
