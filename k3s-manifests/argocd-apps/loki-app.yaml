---
# ArgoCD Application for the loki Helm wrapper.
# Source: k3s-manifests/apps/loki/ (Chart.yaml depends on grafana/loki).
# ArgoCD runs `helm dependency build` automatically on sync.
#
# Alloy is registered separately via the helm-charts-appset.yaml AppSet
# entry (it doesn't need extra templated resources beyond the chart),
# but it depends on the loki-gateway Service existing — that's fine
# because Alloy only fails to write logs (not start) until Loki is up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: homeserver
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/apps/loki

  destination:
    server: https://kubernetes.default.svc
    namespace: loki

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
