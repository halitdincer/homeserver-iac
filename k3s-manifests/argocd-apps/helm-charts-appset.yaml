---
# Generates Application objects for upstream Helm charts (each entry below carries its
# own repo, chart, version, and inline values). Adopts existing Applications of the
# same name on first apply by setting an ownerReference on them.
#
# Add a new app: append a list entry. Remove an app: delete the entry. Use a wrapper
# chart under k3s-manifests/apps/<name>/ if you need to template additional resources
# alongside the upstream chart (see homepage, atlantis, monitoring, argocd).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-charts
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - name: coder
            namespace: coder
            repoURL: https://helm.coder.com/v2
            chart: coder
            targetRevision: "2.30.1"
            values: |
              coder:
                env:
                  - name: CODER_ACCESS_URL
                    value: "https://code.halitdincer.com"
                  - name: CODER_POSTGRESQL_CONNECTION_URL
                    valueFrom:
                      secretKeyRef:
                        name: coder-secret
                        key: CODER_POSTGRESQL_CONNECTION_URL
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 2000m
                    memory: 2Gi
                service:
                  type: ClusterIP
          - name: coder-postgres
            namespace: coder
            repoURL: https://charts.bitnami.com/bitnami
            chart: postgresql
            targetRevision: "18.2.0"
            values: |
              auth:
                username: coder
                database: coder
                existingSecret: coder-secret
                secretKeys:
                  userPasswordKey: postgres-password
              primary:
                persistence:
                  size: 10Gi
                  storageClass: local-path
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1Gi
          - name: external-secrets
            namespace: external-secrets
            repoURL: https://charts.external-secrets.io
            chart: external-secrets
            targetRevision: "0.14.0"
            values: |
              installCRDs: true
              # ESO emits externalsecret_status_condition / externalsecret_sync_calls_*
              # on the controller's metrics port. The ServiceMonitor is auto-discovered
              # by kube-prometheus-stack. Powers the ExternalSecretNotReady alert in
              # apps/monitoring/templates/prometheusrule-cluster.yaml.
              serviceMonitor:
                enabled: true
          - name: argo-rollouts
            namespace: argo-rollouts
            repoURL: https://argoproj.github.io/argo-helm
            chart: argo-rollouts
            targetRevision: "2.40.0"
            values: |
              # Just the controller for now. Apps adopt Rollouts by replacing their
              # Deployment with kind: Rollout in a future PR (e.g. job-scout).
              installCRDs: true
              controller:
                metrics:
                  enabled: true
                  serviceMonitor:
                    enabled: true
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi
              dashboard:
                enabled: true
                # Accessed via `kubectl argo rollouts dashboard` port-forward; no ingress.
                service:
                  type: ClusterIP
          - name: reloader
            namespace: reloader
            repoURL: https://stakater.github.io/stakater-charts
            chart: reloader
            targetRevision: "2.2.0"
            values: |
              reloader:
                # Watch every namespace for annotated Deployments/StatefulSets.
                # Pods carrying `reloader.stakater.com/auto: "true"` (or a list of
                # specific Secrets/ConfigMaps) restart automatically when their
                # referenced Secret or ConfigMap changes — useful for ESO-rotated
                # Vault secrets where the consuming Deployment otherwise keeps
                # serving stale env values.
                watchGlobally: true
                reloadStrategy: annotations
                resources:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
          - name: vault
            namespace: vault
            repoURL: https://helm.releases.hashicorp.com
            chart: vault
            targetRevision: "0.29.1"
            values: |
              global:
                enabled: true
              injector:
                enabled: false
              server:
                standalone:
                  enabled: true
                  config: |
                    ui = true
                    listener "tcp" {
                      tls_disable = 1
                      address     = "[::]:8200"
                      cluster_address = "[::]:8201"
                    }
                    storage "raft" {
                      path    = "/vault/data"
                      node_id = "node1"
                    }
                dataStorage:
                  enabled: true
                  size: 10Gi
                  storageClass: local-path
                ui:
                  enabled: true
                ingress:
                  enabled: false
          - name: alloy
            namespace: alloy
            repoURL: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: "1.8.0"
            values: |
              # Single-node DaemonSet. Alloy plays three roles:
              #   1. Discovers ServiceMonitors cluster-wide and remote_writes the
              #      scraped series to Grafana Cloud Mimir.
              #   2. Scrapes the external Proxmox host node_exporter directly
              #      (replaces the kube-prometheus-stack additionalScrapeConfigs).
              #   3. Tails container logs from every pod via the K8s API and
              #      pushes them to Grafana Cloud Loki.
              # Cloud auth (basic-auth username + token) comes from the
              # grafana-cloud Secret created by the ExternalSecret in
              # k3s-manifests/apps/alloy-external-secret.yaml.
              alloy:
                configMap:
                  create: true
                  content: |
                    // === Metrics: ServiceMonitor discovery ===
                    prometheus.operator.servicemonitors "all" {
                      forward_to = [prometheus.relabel.add_external.receiver]
                    }

                    // === Metrics: external Proxmox host node_exporter ===
                    prometheus.scrape "proxmox_host" {
                      targets = [{
                        __address__ = "10.10.10.1:9100",
                        instance    = "proxmox",
                        job         = "node",
                      }]
                      forward_to      = [prometheus.relabel.add_external.receiver]
                      scrape_interval = "30s"
                    }

                    // Tag every series with cluster=homeserver so dashboards
                    // can pivot on it once we add a second source later.
                    prometheus.relabel "add_external" {
                      forward_to = [prometheus.remote_write.cloud.receiver]
                      rule {
                        target_label = "cluster"
                        replacement  = "homeserver"
                      }
                    }

                    prometheus.remote_write "cloud" {
                      endpoint {
                        url = sys.env("PROM_URL")
                        basic_auth {
                          username = sys.env("PROM_USER")
                          password = sys.env("API_KEY")
                        }
                      }
                    }

                    // === Logs: discover all pods, ship to Cloud Loki ===
                    discovery.kubernetes "pods" {
                      role = "pod"
                    }

                    discovery.relabel "pod_logs" {
                      targets = discovery.kubernetes.pods.targets

                      rule {
                        source_labels = ["__meta_kubernetes_namespace"]
                        target_label  = "namespace"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_name"]
                        target_label  = "pod"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_container_name"]
                        target_label  = "container"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_node_name"]
                        target_label  = "node"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                        target_label  = "app"
                      }
                      rule {
                        target_label = "cluster"
                        replacement  = "homeserver"
                      }
                    }

                    loki.source.kubernetes "pods" {
                      targets    = discovery.relabel.pod_logs.output
                      forward_to = [loki.write.cloud.receiver]
                    }

                    loki.write "cloud" {
                      endpoint {
                        url = sys.env("LOKI_URL")
                        basic_auth {
                          username = sys.env("LOKI_USER")
                          password = sys.env("API_KEY")
                        }
                      }
                    }
                # Inject Cloud Mimir / Loki URLs + creds from the grafana-cloud Secret.
                envFrom:
                  - secretRef:
                      name: grafana-cloud
              controller:
                type: daemonset
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    # No CPU limit (homelab convention).
                    memory: 384Mi
                # Alloy needs cluster-wide read on ServiceMonitor / PodMonitor /
                # PrometheusRule / ConfigMap (for relabel rules) / Secret (for
                # bearer-token refs). The chart's default RBAC covers this for
                # serviceMonitor + log discovery; nothing extra to add here.
              # No serviceMonitor: Alloy is the scraper now, not a scrape target.
              serviceMonitor:
                enabled: false
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
    spec:
      project: homeserver
      source:
        repoURL: '{{.repoURL}}'
        chart: '{{.chart}}'
        targetRevision: '{{.targetRevision}}'
        helm:
          values: |
            {{- .values | nindent 12 }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # ESO ships ExternalSecret/ClusterSecretStore CRDs as part of its own chart;
          # the diff dry-run runs before the CRDs are installed, so without this option
          # the first sync of external-secrets fails on its own custom resources.
          - SkipDryRunOnMissingResource=true
          # SSA is the recommended ArgoCD default and is required for charts shipping
          # large CRDs (argo-rollouts) that exceed the 256 KB CSA annotation limit.
          # Once a resource is SSA-applied, switching back to CSA causes managedFields
          # ownership drift, so this needs to stay on for the AppSet now.
          - ServerSideApply=true
