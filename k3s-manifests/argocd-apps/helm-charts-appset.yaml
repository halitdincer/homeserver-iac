---
# Generates Application objects for upstream Helm charts (each entry below carries its
# own repo, chart, version, and inline values). Adopts existing Applications of the
# same name on first apply by setting an ownerReference on them.
#
# Add a new app: append a list entry. Remove an app: delete the entry. Use a wrapper
# chart under k3s-manifests/apps/<name>/ if you need to template additional resources
# alongside the upstream chart (see homepage, atlantis, monitoring, argocd).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-charts
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - name: coder
            namespace: coder
            repoURL: https://helm.coder.com/v2
            chart: coder
            targetRevision: "2.30.1"
            values: |
              coder:
                env:
                  - name: CODER_ACCESS_URL
                    value: "https://code.halitdincer.com"
                  - name: CODER_POSTGRESQL_CONNECTION_URL
                    valueFrom:
                      secretKeyRef:
                        name: coder-secret
                        key: CODER_POSTGRESQL_CONNECTION_URL
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 2000m
                    memory: 2Gi
                service:
                  type: ClusterIP
          - name: coder-postgres
            namespace: coder
            repoURL: https://charts.bitnami.com/bitnami
            chart: postgresql
            targetRevision: "18.2.0"
            values: |
              auth:
                username: coder
                database: coder
                existingSecret: coder-secret
                secretKeys:
                  userPasswordKey: postgres-password
              primary:
                persistence:
                  size: 10Gi
                  storageClass: local-path
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1Gi
          - name: external-secrets
            namespace: external-secrets
            repoURL: https://charts.external-secrets.io
            chart: external-secrets
            targetRevision: "0.14.0"
            values: |
              installCRDs: true
              # ESO emits externalsecret_status_condition / externalsecret_sync_calls_*
              # on the controller's metrics port. The ServiceMonitor is auto-discovered
              # by kube-prometheus-stack. Powers the ExternalSecretNotReady alert in
              # apps/monitoring/templates/prometheusrule-cluster.yaml.
              serviceMonitor:
                enabled: true
          - name: argo-rollouts
            namespace: argo-rollouts
            repoURL: https://argoproj.github.io/argo-helm
            chart: argo-rollouts
            targetRevision: "2.40.0"
            values: |
              # Just the controller for now. Apps adopt Rollouts by replacing their
              # Deployment with kind: Rollout in a future PR (e.g. job-scout).
              installCRDs: true
              controller:
                metrics:
                  enabled: true
                  serviceMonitor:
                    enabled: true
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi
              dashboard:
                enabled: true
                # Accessed via `kubectl argo rollouts dashboard` port-forward; no ingress.
                service:
                  type: ClusterIP
          - name: reloader
            namespace: reloader
            repoURL: https://stakater.github.io/stakater-charts
            chart: reloader
            targetRevision: "2.2.0"
            values: |
              reloader:
                # Watch every namespace for annotated Deployments/StatefulSets.
                # Pods carrying `reloader.stakater.com/auto: "true"` (or a list of
                # specific Secrets/ConfigMaps) restart automatically when their
                # referenced Secret or ConfigMap changes — useful for ESO-rotated
                # Vault secrets where the consuming Deployment otherwise keeps
                # serving stale env values.
                watchGlobally: true
                reloadStrategy: annotations
                resources:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
          - name: vault
            namespace: vault
            repoURL: https://helm.releases.hashicorp.com
            chart: vault
            targetRevision: "0.29.1"
            values: |
              global:
                enabled: true
              injector:
                enabled: false
              server:
                standalone:
                  enabled: true
                  config: |
                    ui = true
                    listener "tcp" {
                      tls_disable = 1
                      address     = "[::]:8200"
                      cluster_address = "[::]:8201"
                    }
                    storage "raft" {
                      path    = "/vault/data"
                      node_id = "node1"
                    }
                dataStorage:
                  enabled: true
                  size: 10Gi
                  storageClass: local-path
                ui:
                  enabled: true
                ingress:
                  enabled: false
          - name: alloy
            namespace: alloy
            repoURL: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: "1.8.0"
            values: |
              # Single-node DaemonSet. Alloy plays three roles:
              #   1. Discovers ServiceMonitors cluster-wide and remote_writes the
              #      scraped series to Grafana Cloud Mimir.
              #   2. Scrapes the external Proxmox host node_exporter directly
              #      (replaces the kube-prometheus-stack additionalScrapeConfigs).
              #   3. Tails container logs from every pod via the K8s API and
              #      pushes them to Grafana Cloud Loki.
              # Cloud auth (basic-auth username + token) comes from the
              # grafana-cloud Secret created by the ExternalSecret in
              # k3s-manifests/apps/alloy-external-secret.yaml.
              alloy:
                configMap:
                  create: true
                  content: |
                    // === Metrics: ServiceMonitor discovery ===
                    prometheus.operator.servicemonitors "all" {
                      forward_to = [prometheus.relabel.add_external.receiver]
                    }

                    // === Metrics: external Proxmox host node_exporter ===
                    prometheus.scrape "proxmox_host" {
                      targets = [{
                        __address__ = "10.10.10.1:9100",
                        instance    = "proxmox",
                        job         = "node",
                      }]
                      forward_to      = [prometheus.relabel.add_external.receiver]
                      scrape_interval = "30s"
                    }

                    // === Metrics: kubelet + cAdvisor on every K8s node ===
                    // Scraped via the API-server proxy so we don't need to
                    // know each node's IP. Series volume is pruned aggressively
                    // (see kubelet_filter / cadvisor_filter) to stay under the
                    // Cloud Free-tier 10k active-series cap.
                    discovery.kubernetes "nodes" {
                      role = "node"
                    }

                    discovery.relabel "kubelet" {
                      targets = discovery.kubernetes.nodes.targets
                      rule {
                        target_label = "__address__"
                        replacement  = "kubernetes.default.svc.cluster.local:443"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_node_name"]
                        regex         = "(.+)"
                        target_label  = "__metrics_path__"
                        replacement   = "/api/v1/nodes/${1}/proxy/metrics"
                      }
                    }

                    discovery.relabel "cadvisor" {
                      targets = discovery.kubernetes.nodes.targets
                      rule {
                        target_label = "__address__"
                        replacement  = "kubernetes.default.svc.cluster.local:443"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_node_name"]
                        regex         = "(.+)"
                        target_label  = "__metrics_path__"
                        replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
                      }
                    }

                    prometheus.scrape "kubelet" {
                      targets         = discovery.relabel.kubelet.output
                      forward_to      = [prometheus.relabel.kubelet_filter.receiver]
                      job_name        = "kubelet"
                      scheme          = "https"
                      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                      tls_config {
                        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                        insecure_skip_verify = true
                      }
                      scrape_interval = "30s"
                    }

                    prometheus.scrape "cadvisor" {
                      targets         = discovery.relabel.cadvisor.output
                      forward_to      = [prometheus.relabel.cadvisor_filter.receiver]
                      job_name        = "cadvisor"
                      scheme          = "https"
                      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                      tls_config {
                        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                        insecure_skip_verify = true
                      }
                      scrape_interval = "30s"
                    }

                    // Keep only the kubelet metrics queried by dashboards.
                    prometheus.relabel "kubelet_filter" {
                      forward_to = [prometheus.relabel.add_external.receiver]
                      rule {
                        source_labels = ["__name__"]
                        regex         = "kubelet_volume_stats_(available|capacity)_bytes"
                        action        = "keep"
                      }
                    }

                    // Keep only the cAdvisor metrics queried by dashboards,
                    // and drop high-cardinality labels we never group by.
                    prometheus.relabel "cadvisor_filter" {
                      forward_to = [prometheus.relabel.add_external.receiver]
                      rule {
                        source_labels = ["__name__"]
                        regex         = "container_(cpu_usage_seconds_total|memory_working_set_bytes)"
                        action        = "keep"
                      }
                      rule {
                        action = "labeldrop"
                        regex  = "id|image|name|uid|container_id"
                      }
                    }

                    // Tag every series with cluster=homeserver and drop the
                    // high-cardinality metric families we don't query. This is
                    // the choke point for every scrape path (ServiceMonitors,
                    // kubelet, cAdvisor, Proxmox host) before remote_write, so
                    // one filter covers everything.
                    //
                    // Series-budget targets (Cloud Free tier caps at 10k):
                    //   node_systemd_unit_state           ~1325 (Proxmox host)
                    //   grpc_server_*                     ~1906 (argocd-server)
                    //   workqueue_*_bucket                ~628  (controller histograms)
                    //   controller_runtime_*_bucket       ~205
                    // Total reclaim ~4k series.
                    prometheus.relabel "add_external" {
                      forward_to = [prometheus.remote_write.cloud.receiver]
                      rule {
                        source_labels = ["__name__"]
                        regex         = "node_systemd_.*|grpc_server_.*|workqueue_.+_bucket|controller_runtime_.+_bucket"
                        action        = "drop"
                      }
                      rule {
                        target_label = "cluster"
                        replacement  = "homeserver"
                      }
                    }

                    prometheus.remote_write "cloud" {
                      endpoint {
                        url = sys.env("PROM_URL")
                        basic_auth {
                          username = sys.env("PROM_USER")
                          password = sys.env("API_KEY")
                        }
                      }
                    }

                    // === Logs: discover all pods, ship to Cloud Loki ===
                    discovery.kubernetes "pods" {
                      role = "pod"
                    }

                    discovery.relabel "pod_logs" {
                      targets = discovery.kubernetes.pods.targets

                      rule {
                        source_labels = ["__meta_kubernetes_namespace"]
                        target_label  = "namespace"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_name"]
                        target_label  = "pod"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_container_name"]
                        target_label  = "container"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_node_name"]
                        target_label  = "node"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                        target_label  = "app"
                      }
                      rule {
                        target_label = "cluster"
                        replacement  = "homeserver"
                      }
                    }

                    loki.source.kubernetes "pods" {
                      targets    = discovery.relabel.pod_logs.output
                      forward_to = [loki.write.cloud.receiver]
                    }

                    loki.write "cloud" {
                      endpoint {
                        url = sys.env("LOKI_URL")
                        basic_auth {
                          username = sys.env("LOKI_USER")
                          password = sys.env("API_KEY")
                        }
                      }
                    }
                # Inject Cloud Mimir / Loki URLs + creds from the grafana-cloud Secret.
                envFrom:
                  - secretRef:
                      name: grafana-cloud
                # Resource requests/limits for the alloy container itself.
                # NOTE: must live under `alloy.resources`, NOT
                # `controller.resources` -- the chart silently ignores the
                # latter, which left Alloy unlimited from PR #14 through #16.
                resources:
                  requests:
                    cpu: 100m
                    memory: 384Mi
                  limits:
                    # No CPU limit (homelab convention).
                    # 768Mi gives ~60% headroom over observed 472Mi steady-
                    # state (kubelet + cAdvisor scrape paths from PR #14).
                    memory: 768Mi
              controller:
                type: daemonset
                # Alloy needs cluster-wide read on ServiceMonitor / PodMonitor /
                # PrometheusRule / ConfigMap (for relabel rules) / Secret (for
                # bearer-token refs). The chart's default RBAC covers this for
                # serviceMonitor + log discovery; nothing extra to add here.
              # No serviceMonitor: Alloy is the scraper now, not a scrape target.
              serviceMonitor:
                enabled: false
          - name: kube-state-metrics
            namespace: kube-state-metrics
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-state-metrics
            targetRevision: "5.27.0"
            values: |
              # Exposes Kubernetes object state (Node Ready, Pod phase, …) as
              # Prometheus metrics. Discovered by Alloy via ServiceMonitor.
              # Series budget: ~1.5k for this homelab. Allowlist below limits
              # the scrape to only the metric families the dashboards query, so
              # we don't burn the Cloud Free-tier 10k cap on `kube_pod_labels`
              # and friends.
              metricLabelsAllowlist:
                - "nodes=[*]"
              metricAllowlist:
                - "kube_node_status_condition"
                - "kube_pod_status_phase"
              prometheus:
                monitor:
                  enabled: true
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits:   { memory: 64Mi }
          - name: prometheus-node-exporter
            namespace: prometheus-node-exporter
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: prometheus-node-exporter
            targetRevision: "4.50.0"
            values: |
              # Per-node host metrics (CPU, memory, filesystem, network) for the
              # K3s VM. The Proxmox host ships its own node_exporter via Alloy's
              # `prometheus.scrape "proxmox_host"` block; this DaemonSet covers
              # everything else. Discovered by Alloy via ServiceMonitor.
              prometheus:
                monitor:
                  enabled: true
                  # Replace the auto-generated `<pod-ip>:<port>` instance label
                  # with the node name (e.g. "k3s"), matching the dashboard
                  # convention used for the Proxmox scrape (instance="proxmox").
                  relabelings:
                    - sourceLabels: [__meta_kubernetes_pod_node_name]
                      targetLabel: instance
              resources:
                requests: { cpu: 10m, memory: 24Mi }
                limits:   { memory: 64Mi }
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
    spec:
      project: homeserver
      source:
        repoURL: '{{.repoURL}}'
        chart: '{{.chart}}'
        targetRevision: '{{.targetRevision}}'
        helm:
          values: |
            {{- .values | nindent 12 }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # ESO ships ExternalSecret/ClusterSecretStore CRDs as part of its own chart;
          # the diff dry-run runs before the CRDs are installed, so without this option
          # the first sync of external-secrets fails on its own custom resources.
          - SkipDryRunOnMissingResource=true
          # SSA is the recommended ArgoCD default and is required for charts shipping
          # large CRDs (argo-rollouts) that exceed the 256 KB CSA annotation limit.
          # Once a resource is SSA-applied, switching back to CSA causes managedFields
          # ownership drift, so this needs to stay on for the AppSet now.
          - ServerSideApply=true
