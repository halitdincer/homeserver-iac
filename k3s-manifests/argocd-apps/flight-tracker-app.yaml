# ArgoCD Application for flight-tracker
# Deploys the Minimal Live Flight Tracker at flights.halitdincer.com
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flight-tracker
  namespace: argocd

spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/flight-tracker
  destination:
    server: https://kubernetes.default.svc
    namespace: flight-tracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
