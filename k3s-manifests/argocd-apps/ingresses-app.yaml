---
# ArgoCD Application for Ingress Resources
# This tells ArgoCD to watch the ingresses/ directory and auto-deploy changes
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingresses
  namespace: argocd
spec:
  # Source: Your Git repository
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/ingresses

  # Destination: K3s cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  # Sync policy: Automatic deployment on Git push
  syncPolicy:
    automated:
      prune: true        # Delete resources removed from Git
      selfHeal: true     # Revert manual changes
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true

  # Project
  project: default
