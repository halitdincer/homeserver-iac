---
# ArgoCD Application for the monitoring Helm wrapper.
# Source: k3s-manifests/apps/monitoring/ (Chart.yaml depends on
# prometheus-community/kube-prometheus-stack). ArgoCD runs `helm dependency
# build` automatically on sync.
#
# ServerSideApply=true is required: kube-prometheus-stack ships several CRDs
# whose schema exceeds the 256 KB last-applied-configuration annotation limit
# imposed by client-side apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/apps/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  # ESO's defaulting webhook injects fields (conversionStrategy, decodingStrategy,
  # metadataPolicy, creationPolicy, deletionPolicy) onto every ExternalSecret it
  # admits. Those defaults are not in our source manifest, so ArgoCD reports the
  # resource as OutOfSync forever. Ignore them.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/dataFrom/0/extract/conversionStrategy
        - /spec/dataFrom/0/extract/decodingStrategy
        - /spec/dataFrom/0/extract/metadataPolicy
        - /spec/target/creationPolicy
        - /spec/target/deletionPolicy
