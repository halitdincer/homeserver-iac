---
# ArgoCD Application for the homepage Helm wrapper.
# Source: k3s-manifests/apps/homepage/ (Chart.yaml depends on jameswynn/homepage).
# ArgoCD runs `helm dependency build` automatically on sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:halitdincer/homeserver-iac.git
    targetRevision: main
    path: k3s-manifests/apps/homepage

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
