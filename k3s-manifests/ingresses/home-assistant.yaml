---
# Home Assistant - Smart Home
# Domain: ha.halitdincer.com, homeassistant.halitdincer.com
# Backend: 192.168.2.206:8123
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: default
  annotations:
    # Automatic SSL certificate from Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Preserve original Host header (required for ExternalName with IP)
    nginx.ingress.kubernetes.io/upstream-vhost: "$host"
    # WebSocket support for Home Assistant
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: |
      Upgrade $http_upgrade
      Connection "upgrade"
    # Increase timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ha.halitdincer.com
    - homeassistant.halitdincer.com
    secretName: home-assistant-tls
  rules:
  - host: ha.halitdincer.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant-external
            port:
              number: 8123
  - host: homeassistant.halitdincer.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant-external
            port:
              number: 8123

---
# External Service pointing to Home Assistant VM
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-external
  namespace: default
spec:
  type: ExternalName
  externalName: 192.168.2.206
  ports:
  - port: 8123
    targetPort: 8123
