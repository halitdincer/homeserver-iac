---
# Home Assistant - Smart Home
# Domain: ha.halitdincer.com, homeassistant.halitdincer.com
# Backend: 10.10.10.103:8123
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: default
  annotations:
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # WebSocket support for Home Assistant
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Increase timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: ha.halitdincer.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant-external
            port:
              number: 8123
  - host: homeassistant.halitdincer.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant-external
            port:
              number: 8123

---
# ClusterIP service with manual Endpoints pointing to Home Assistant VM
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-external
  namespace: default
spec:
  ports:
  - port: 8123
    targetPort: 8123

---
apiVersion: v1
kind: Endpoints
metadata:
  name: home-assistant-external
  namespace: default
subsets:
- addresses:
  - ip: 10.10.10.103
  ports:
  - port: 8123
