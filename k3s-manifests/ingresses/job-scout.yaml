# job-scout - Job Board Tracker
# Domain: jobs.halitdincer.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-scout
  namespace: job-scout
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: jobs.halitdincer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: job-scout
                port:
                  number: 8000
