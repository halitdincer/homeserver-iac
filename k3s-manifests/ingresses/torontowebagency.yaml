# torontowebagency - dedicated agency website and Payload CMS
# Domain: torontowebagency.ca, www.torontowebagency.ca
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: torontowebagency
  namespace: torontowebagency
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: torontowebagency.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: torontowebagency
                port:
                  number: 3002
    - host: www.torontowebagency.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: torontowebagency
                port:
                  number: 3002
