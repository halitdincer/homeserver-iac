apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grove-cms-secret
  annotations:
    # Block the grove-cms Deployment until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grove-cms-secret
  dataFrom:
    - extract:
        key: secret/grove-cms/config
