apiVersion: apps/v1
kind: Deployment
metadata:
  name: grove-cms
  labels:
    app: grove-cms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grove-cms
  template:
    metadata:
      labels:
        app: grove-cms
    spec:
      containers:
        - name: grove-cms
          image: ghcr.io/halitdincer/grove-cms:sha-a0dc408ae584e8f3091204f397aa7609bcbc81ce
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URI
              value: file:/data/grove-cms.db
            - name: NEXT_PUBLIC_SERVER_URL
              value: https://cms.torontowebagency.ca
            - name: REBUILD_SERVER_URL
              value: http://127.0.0.1:3001
            - name: STATIC_BUILD_TO_DISK
              value: "false"
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: grove-cms-secret
                  key: PAYLOAD_SECRET
            - name: REBUILD_SECRET
              valueFrom:
                secretKeyRef:
                  name: grove-cms-secret
                  key: PAYLOAD_SECRET
          envFrom:
            - secretRef:
                name: grove-sites-credentials
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/access
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/access
              port: 3001
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 16Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grove-cms-data
