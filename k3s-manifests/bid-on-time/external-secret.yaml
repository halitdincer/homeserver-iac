apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bid-on-time-secret
  annotations:
    # Block the Deployment until the Secret materializes.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bid-on-time-secret
  dataFrom:
    - extract:
        key: secret/bid-on-time/config
