---
# Cloudflare API token used by cert-manager for DNS-01 ACME challenges.
# Vault path: secret/cert-manager/config (key: cloudflare-api-token)
# Token scope: Zone:DNS:Edit + Zone:Zone:Read on halitdincer.com only.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  annotations:
    # Sync before any consumer (wave 0). ArgoCD's built-in ExternalSecret
    # health check reports Healthy only when the produced Secret is ready,
    # so the next wave waits for ESO to materialize the token.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: secret/cert-manager/config
        property: cloudflare-api-token
