---
# Wildcard cert for *.halitdincer.com (+ apex), issued via Cloudflare DNS-01.
# Used as the default SSL cert for the nginx-ingress controller — every
# ingress under *.halitdincer.com inherits it without per-ingress tls config.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-halitdincer
  namespace: ingress-nginx
spec:
  secretName: wildcard-halitdincer-tls
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
  privateKey:
    rotationPolicy: Always
  dnsNames:
    - "*.halitdincer.com"
    - "halitdincer.com"
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
