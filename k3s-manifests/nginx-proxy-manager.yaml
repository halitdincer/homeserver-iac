---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-proxy-manager

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-data
  namespace: nginx-proxy-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-letsencrypt
  namespace: nginx-proxy-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy-manager
  namespace: nginx-proxy-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy-manager
  template:
    metadata:
      labels:
        app: nginx-proxy-manager
    spec:
      containers:
      - name: nginx-proxy-manager
        image: jc21/nginx-proxy-manager:latest
        ports:
        - containerPort: 80
          hostPort: 80
          name: http
          protocol: TCP
        - containerPort: 443
          hostPort: 443
          name: https
          protocol: TCP
        - containerPort: 81
          name: admin
          protocol: TCP
        env:
        - name: DISABLE_IPV6
          value: "true"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: letsencrypt
          mountPath: /etc/letsencrypt
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: npm-data
      - name: letsencrypt
        persistentVolumeClaim:
          claimName: npm-letsencrypt

---
# Admin interface (port 81)
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-manager-admin
  namespace: nginx-proxy-manager
spec:
  type: NodePort
  selector:
    app: nginx-proxy-manager
  ports:
  - port: 81
    targetPort: 81
    name: admin

---
# HTTP service (port 80) - Using HostPort for direct port 80 access
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-manager-http
  namespace: nginx-proxy-manager
spec:
  type: ClusterIP
  selector:
    app: nginx-proxy-manager
  ports:
  - port: 80
    targetPort: 80
    name: http

---
# HTTPS service (port 443) - Using HostPort for direct port 443 access
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-manager-https
  namespace: nginx-proxy-manager
spec:
  type: ClusterIP
  selector:
    app: nginx-proxy-manager
  ports:
  - port: 443
    targetPort: 443
    name: https
